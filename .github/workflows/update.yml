name: Update Switch Database

on:
  schedule:
    - cron: '0 6 * * *' # Каждый день в 6:00 UTC
  workflow_dispatch:     # Кнопка ручного запуска

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    # Включаем принудительное использование Node.js 24, как просит GitHub
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # На текущий момент v4 актуальна, переменная выше решит проблему

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        run: python scraper.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Добавляем наш обновленный JSON
          git add switch_games.json
          
          # Проверяем, изменилось ли что-то на самом деле
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit. Everything is up to date."
          else
            git commit -m "Auto-update database: $(date)"
            
            # --- РЕШЕНИЕ ПРОБЛЕМЫ ---
            # Забираем изменения из GitHub. --rebase перенесет наш новый коммит 
            # в самый конец очереди, исключая конфликты.
            git pull --rebase origin main
            
            # Теперь пушим со спокойной душой
            git push origin main
          fi
